services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fira
      POSTGRES_PASSWORD: fira
      POSTGRES_DB: fira
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fira -d fira"]
      interval: 2s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://fira:fira@postgres:5432/fira
      API_BIND_ADDR: 0.0.0.0:3000
      RUST_LOG: info,sqlx=warn,tower_http=info
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-target:/app/target
    depends_on:
      postgres:
        condition: service_healthy
    command: cargo watch -q -c -w src -x run

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
    command: pnpm dev --host 0.0.0.0

volumes:
  pgdata:
  cargo-cache:
  cargo-target:
  web-node-modules:

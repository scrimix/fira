services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fira
      POSTGRES_PASSWORD: fira
      POSTGRES_DB: fira
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fira -d fira"]
      interval: 2s
      timeout: 3s
      retries: 20

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    environment:
      RUSTFS_NOTIFY_ENABLE: "false"
      RUSTFS_CONSOLE_ENABLE: "true"
    restart: unless-stopped

volumes:
  pgdata:
  cargo-cache:
  cargo-target:
  web-node-modules:
  rustfs-data:
  rustfs-logs:
